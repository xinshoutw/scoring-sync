<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}" type="image/svg+xml">
    <title>{% block title %}scoring-sync{% endblock %}</title>
    <script>
        (function () {
            var t = localStorage.getItem('theme') || 'dark';
            document.documentElement.className = t;
        })();
    </script>
    <style>
        /* ── Design tokens ─────────────────────────────────── */
        html.dark {
            --bg:          #0b0d12;
            --surface:     #14171f;
            --surface-hi:  #1a1e28;
            --border:      #262b37;
            --border-hi:   #343b4b;
            --fg:          #e8eaf0;
            --fg-muted:    #8b93a7;
            --fg-subtle:   #5d6578;
            --accent:      #7aa2ff;
            --accent-hi:   #a5bfff;
            --accent-glow: rgba(122, 162, 255, 0.16);
            --success:     #4ade80;
            --warning:     #fbbf24;
            --danger:      #f87171;
            --self-bg:     rgba(122, 162, 255, 0.08);
            --grad-hero:   linear-gradient(135deg, #7aa2ff 0%, #60d394 45%, #fbbf24 100%);
        }
        html.light {
            --bg:          #f6f8fb;
            --surface:     #ffffff;
            --surface-hi:  #ffffff;
            --border:      #e1e6ed;
            --border-hi:   #c7cfdc;
            --fg:          #0f1419;
            --fg-muted:    #5a6474;
            --fg-subtle:   #8a94a3;
            --accent:      #3a57d9;
            --accent-hi:   #2b44be;
            --accent-glow: rgba(58, 87, 217, 0.14);
            --success:     #16a34a;
            --warning:     #d97706;
            --danger:      #dc2626;
            --self-bg:     rgba(58, 87, 217, 0.06);
            --grad-hero:   linear-gradient(135deg, #3a57d9 0%, #0c9488 45%, #d97706 100%);
        }

        /* ── Base ─────────────────────────────────────────── */
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--fg);
            font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Noto Sans TC", sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace; }
        h1 { font-weight: 700; letter-spacing: -0.03em; font-size: 32px; margin: 0 0 4px; }
        h2 { font-weight: 600; letter-spacing: -0.01em; font-size: 18px; margin: 0 0 12px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hi); }
        .muted { color: var(--fg-muted); }
        .subtle { color: var(--fg-subtle); }
        kbd {
            display: inline-block;
            padding: 1px 6px;
            background: var(--surface-hi);
            border: 1px solid var(--border);
            border-radius: 4px;
            font: 12px ui-monospace, monospace;
            color: var(--fg-muted);
        }

        /* ── Header ───────────────────────────────────────── */
        header.top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        header.top .brand {
            font: 700 17px/1 ui-monospace, monospace;
            letter-spacing: -0.02em;
            color: var(--fg);
        }
        header.top nav {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 13px;
        }
        header.top .user-info { color: var(--fg-muted); margin-right: 8px; }

        /* ── Layout ───────────────────────────────────────── */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 28px 80px;
        }

        /* ── Cards ────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 22px;
        }
        .card-hi {
            background: var(--surface-hi);
            border: 1px solid var(--border-hi);
            border-radius: 12px;
            padding: 20px 22px;
        }

        /* ── Forms ────────────────────────────────────────── */
        input[type="text"], input[type="password"], input[type="email"], input[type="number"], textarea, select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 9px 12px;
            border-radius: 8px;
            font: inherit;
            width: 100%;
            transition: border-color 120ms;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        label { display: block; font-size: 13px; color: var(--fg-muted); margin-bottom: 6px; }
        textarea { resize: vertical; font-family: inherit; min-height: 64px; }

        /* ── Buttons ──────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 7px 14px;
            border-radius: 8px;
            font: inherit;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 120ms, background 120ms;
        }
        .btn:hover { border-color: var(--border-hi); background: var(--surface-hi); }
        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 500;
        }
        .btn.primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn.danger:hover { background: rgba(248, 113, 113, 0.1); }

        /* ── Logo + 其他亮點元素 ─────────────────────────── */
        .logo-wrap {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--fg);
        }
        .logo-mark {
            width: 28px;
            height: 28px;
            display: inline-block;
            background: var(--grad-hero);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .logo-mark::after {
            content: "";
            position: absolute;
            inset: 2px;
            background: var(--surface);
            border-radius: 6px;
        }
        .logo-mark svg {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        .logo-text { font-weight: 700; letter-spacing: -0.01em; font-size: 16px; }
        .accent-gradient-text {
            background: var(--grad-hero);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border-hi);
            border-radius: 999px;
            transition: background 150ms;
        }
        .switch .slider::before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            top: 3px;
            background: var(--fg);
            border-radius: 50%;
            transition: transform 150ms;
        }
        .switch input:checked + .slider { background: var(--accent); }
        .switch input:checked + .slider::before {
            transform: translateX(16px);
            background: #fff;
        }

        /* ── Reconnect banner ─────────────────────────────── */
        #reconnect-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 10px 16px;
            background: var(--warning);
            color: #0b0d12;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            transform: translateY(-100%);
            transition: transform 200ms ease-out;
        }
        #reconnect-banner.visible {
            transform: translateY(0);
        }
        #reconnect-banner .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0b0d12;
            margin-right: 8px;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.7); }
        }

        /* ── Pills ────────────────────────────────────────── */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--fg-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .pill.success { border-color: var(--success); color: var(--success); }
        .pill.failed  { border-color: var(--danger);  color: var(--danger); }
        .pill.pending { border-color: var(--warning); color: var(--warning); }
        .pill.skipped { border-color: var(--border);  color: var(--fg-subtle); }

        /* ── Errors / banners ─────────────────────────────── */
        .error {
            padding: 10px 14px;
            border: 1px solid var(--danger);
            background: rgba(248, 113, 113, 0.08);
            color: var(--danger);
            border-radius: 8px;
            font-size: 14px;
        }
        .info-banner {
            padding: 10px 14px;
            border: 1px solid var(--accent);
            background: rgba(122, 139, 255, 0.08);
            color: var(--accent);
            border-radius: 8px;
            font-size: 14px;
        }

        /* ── Tables ───────────────────────────────────────── */
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid var(--border); }
        th { text-align: left; padding: 10px 8px; font-weight: 600; font-size: 13px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 120ms; }
        tbody tr:hover { background: var(--surface-hi); }
        td { padding: 14px 8px; }
        tr.is-self { background: var(--self-bg); }
        tr.is-self:hover { background: var(--self-bg); filter: brightness(1.2); }

        /* ── Period tabs ──────────────────────────────────── */
        .tabs {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .tabs a {
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 14px;
            color: var(--fg-muted);
            transition: all 120ms;
        }
        .tabs a:hover { color: var(--fg); background: var(--surface-hi); }
        .tabs a.active {
            background: var(--accent);
            color: #fff;
        }
        .tabs a.disabled {
            color: var(--fg-subtle);
            pointer-events: none;
            opacity: 0.4;
        }

        /* ── Helpers ──────────────────────────────────────── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .row { display: flex; align-items: center; gap: 12px; }
        .row-between { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .stack { display: flex; flex-direction: column; gap: 16px; }
    </style>
</head>
<body>
    <div id="reconnect-banner" role="status" aria-live="polite">
        <span class="dot"></span><span id="reconnect-text">連線中斷，正在重新連線…</span>
    </div>
    {% if user %}
    <header class="top">
        <a href="/dashboard" class="logo-wrap">
            <span class="logo-mark">
                <svg width="28" height="28" viewBox="0 0 28 28">
                    <path d="M8 14.5 L12 18 L20 10" fill="none" stroke="url(#g1)" stroke-width="2.4"
                          stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#7aa2ff"/>
                            <stop offset="60%" stop-color="#60d394"/>
                            <stop offset="100%" stop-color="#fbbf24"/>
                        </linearGradient>
                    </defs>
                </svg>
            </span>
            <span class="logo-text">評分系統</span>
        </a>
        <nav>
            <span class="user-info">{{ user.user_id }} · {{ user.name }}</span>
            <button type="button" class="btn" onclick="toggleTheme()" title="切換主題">主題</button>
            <form method="post" action="/logout" style="margin:0">
                <button type="submit" class="btn">登出</button>
            </form>
        </nav>
    </header>
    {% endif %}
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        function toggleTheme() {
            var cur = document.documentElement.className;
            var next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.className = next;
            localStorage.setItem('theme', next);
        }

        // ── Heartbeat：每 3 秒 ping /heartbeat；斷線顯示 banner、恢復後 server id 變更則 reload ──
        (function () {
            var banner = document.getElementById('reconnect-banner');
            var textEl = document.getElementById('reconnect-text');
            var initialId = null;
            var wasDown = false;

            async function ping() {
                try {
                    var r = await fetch('/heartbeat', { cache: 'no-store', credentials: 'same-origin' });
                    if (!r.ok) throw new Error('bad_status_' + r.status);
                    var d = await r.json();
                    if (initialId === null) {
                        initialId = d.id;
                    } else if (d.id !== initialId) {
                        // 伺服器已重啟且目前連線新版 → 直接 reload 取最新資料
                        textEl.textContent = '伺服器已更新，重新載入頁面…';
                        setTimeout(function () { window.location.reload(); }, 400);
                        return;
                    }
                    if (wasDown) {
                        textEl.textContent = '已重新連線';
                        setTimeout(function () { banner.classList.remove('visible'); }, 600);
                        wasDown = false;
                    }
                } catch (e) {
                    wasDown = true;
                    textEl.textContent = '連線中斷，正在重新連線…';
                    banner.classList.add('visible');
                }
            }

            ping();
            setInterval(ping, 3000);
            // 視窗重新取得焦點時立刻檢查（分頁切回來不用等下一個 tick）
            window.addEventListener('focus', ping);
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
