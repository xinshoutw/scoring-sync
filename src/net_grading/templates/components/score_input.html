{# 用法：{% include "components/score_input.html" with ctx = {field: 'topic', label: '主題掌握', max: 30, value: 30} %} #}
<div style="display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--border);">
    <label for="score_{{ field }}" style="font-size: 15px;">{{ label }}</label>
    <div style="display: flex; align-items: baseline; gap: 6px;">
        <input type="number"
               id="score_{{ field }}"
               name="score_{{ field }}"
               data-score
               min="0"
               max="{{ max }}"
               step="1"
               value="{{ value | default(max) }}"
               style="width: 72px; font: 600 24px/1.2 ui-monospace, 'SF Mono', Menlo, monospace;
                      background: transparent; color: var(--fg); border: 1px solid var(--border);
                      border-radius: 6px; padding: 6px 8px; text-align: center;">
        <span class="muted" style="font-family: ui-monospace, monospace;">/ {{ max }}</span>
    </div>
</div>
