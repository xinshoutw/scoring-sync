<div style="display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 14px 0; border-bottom: 1px solid var(--border);">
    <label for="score_{{ field }}" style="margin: 0; color: var(--fg); font-size: 15px;">{{ label }}</label>
    <div class="row" style="gap: 8px;">
        <input type="number"
               id="score_{{ field }}"
               name="score_{{ field }}"
               data-score
               min="0"
               max="{{ max }}"
               step="1"
               value="{{ value | default(max) }}"
               style="width: 80px; font: 700 22px/1 ui-monospace, 'SF Mono', Menlo, monospace;
                      text-align: center; padding: 8px 6px;">
        <span class="subtle mono" style="font-size: 14px;">/ {{ max }}</span>
    </div>
</div>
