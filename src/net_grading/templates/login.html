{% extends "base.html" %}
{% block title %}登入 · 評分系統{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 80px auto 0;">
    <div class="logo-wrap" style="margin-bottom: 20px;">
        <span class="logo-mark">
            <svg width="28" height="28" viewBox="0 0 28 28">
                <path d="M8 14.5 L12 18 L20 10" fill="none" stroke="url(#gl)" stroke-width="2.4"
                      stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#7aa2ff"/>
                        <stop offset="60%" stop-color="#60d394"/>
                        <stop offset="100%" stop-color="#fbbf24"/>
                    </linearGradient>
                </defs>
            </svg>
        </span>
        <span class="logo-text">評分系統</span>
    </div>
    <h1 style="font-size: 32px; line-height: 1.15;">
        一次評分<br>
        <span class="accent-gradient-text">同步三站</span>
    </h1>

    <form method="post" action="/login" class="card" style="margin-top: 28px; padding: 28px;">
        <label for="student_id">學號</label>
        <input type="text" name="student_id" id="student_id" required autofocus
               autocomplete="username" placeholder="B11315009"
               value="{{ student_id | default('') }}">
        {% if error %}
        <p class="error" style="margin-top: 16px;">{{ error }}</p>
        {% endif %}
        <button type="submit" class="btn primary" style="margin-top: 20px; width: 100%; justify-content: center;">登入</button>
    </form>
</div>
{% endblock %}
